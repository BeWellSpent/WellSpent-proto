syntax = "proto3";

package wellspent.v1;

import "google/protobuf/timestamp.proto";
import "wellspent/v1/common.proto";

option go_package = "github.com/BeWellSpent/wellspent-backend/gen/wellspent/v1;wellspentv1";

service BudgetService {
  // BudgetProfile CRUD — the stable, user-configured core of a budget
  rpc CreateBudgetProfile(CreateBudgetProfileRequest) returns (CreateBudgetProfileResponse);
  rpc ListBudgetProfiles(ListBudgetProfilesRequest) returns (ListBudgetProfilesResponse);
  rpc GetBudgetProfile(GetBudgetProfileRequest) returns (GetBudgetProfileResponse);
  rpc UpdateBudgetProfile(UpdateBudgetProfileRequest) returns (UpdateBudgetProfileResponse);
  rpc DeleteBudgetProfile(DeleteBudgetProfileRequest) returns (DeleteBudgetProfileResponse);

  // BudgetPeriod — one per cycle window; first created on profile setup, rest by the cycling job
  rpc CreateBudgetPeriod(CreateBudgetPeriodRequest) returns (CreateBudgetPeriodResponse);
  rpc ListBudgetPeriods(ListBudgetPeriodsRequest) returns (ListBudgetPeriodsResponse);
  rpc GetBudgetPeriod(GetBudgetPeriodRequest) returns (GetBudgetPeriodResponse);

  // People — profile-scoped; shared across all periods
  rpc AddBudgetPeople(AddBudgetPeopleRequest) returns (AddBudgetPeopleResponse);
  rpc ListBudgetPeople(ListBudgetPeopleRequest) returns (ListBudgetPeopleResponse);
  rpc UpdateBudgetPerson(UpdateBudgetPersonRequest) returns (UpdateBudgetPersonResponse);
  rpc UpdateBudgetPersonRole(UpdateBudgetPersonRoleRequest) returns (UpdateBudgetPersonRoleResponse);
  rpc RemoveBudgetPerson(RemoveBudgetPersonRequest) returns (RemoveBudgetPersonResponse);

  // Income sources — profile-level templates
  rpc AddIncomeSource(AddIncomeSourceRequest) returns (AddIncomeSourceResponse);
  rpc ListIncomeSources(ListIncomeSourcesRequest) returns (ListIncomeSourcesResponse);
  rpc UpdateIncomeSource(UpdateIncomeSourceRequest) returns (UpdateIncomeSourceResponse);
  rpc DeleteIncomeSource(DeleteIncomeSourceRequest) returns (DeleteIncomeSourceResponse);

  // Income entries — period-level actual amounts (pre-filled from sources, user-editable)
  rpc ListIncomeEntries(ListIncomeEntriesRequest) returns (ListIncomeEntriesResponse);
  rpc UpdateIncomeEntry(UpdateIncomeEntryRequest) returns (UpdateIncomeEntryResponse);

  // Savings sources — profile-level allocations
  rpc AddSavingsSource(AddSavingsSourceRequest) returns (AddSavingsSourceResponse);
  rpc ListSavingsSources(ListSavingsSourcesRequest) returns (ListSavingsSourcesResponse);
  rpc UpdateSavingsSource(UpdateSavingsSourceRequest) returns (UpdateSavingsSourceResponse);
  rpc DeleteSavingsSource(DeleteSavingsSourceRequest) returns (DeleteSavingsSourceResponse);

  // Transactions — period-scoped
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc UpdateTransaction(UpdateTransactionRequest) returns (UpdateTransactionResponse);
  rpc DeleteTransaction(DeleteTransactionRequest) returns (DeleteTransactionResponse);
  rpc MarkTransactionAsPaid(MarkTransactionAsPaidRequest) returns (MarkTransactionAsPaidResponse);
  rpc UnmarkTransactionAsPaid(UnmarkTransactionAsPaidRequest) returns (UnmarkTransactionAsPaidResponse);

  // Categories — user-scoped, unchanged
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);

  // Payment methods — profile-scoped via BudgetPerson
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse);
  rpc CreatePaymentMethod(CreatePaymentMethodRequest) returns (CreatePaymentMethodResponse);
  rpc UpdatePaymentMethod(UpdatePaymentMethodRequest) returns (UpdatePaymentMethodResponse);
  rpc DeletePaymentMethod(DeletePaymentMethodRequest) returns (DeletePaymentMethodResponse);

  // Expense allocations — per-person planned amounts per category; profile-scoped
  rpc ListExpenseAllocations(ListExpenseAllocationsRequest) returns (ListExpenseAllocationsResponse);
  rpc UpsertExpenseAllocation(UpsertExpenseAllocationRequest) returns (UpsertExpenseAllocationResponse);
  rpc DeleteExpenseAllocation(DeleteExpenseAllocationRequest) returns (DeleteExpenseAllocationResponse);

  // Fixed expenses — profile-level recurring bill templates
  rpc ListFixedExpenses(ListFixedExpensesRequest) returns (ListFixedExpensesResponse);
  rpc CreateFixedExpense(CreateFixedExpenseRequest) returns (CreateFixedExpenseResponse);
  rpc UpdateFixedExpense(UpdateFixedExpenseRequest) returns (UpdateFixedExpenseResponse);
  rpc DeleteFixedExpense(DeleteFixedExpenseRequest) returns (DeleteFixedExpenseResponse);

  // Transaction review — Plaid-imported transactions that may match a fixed expense
  rpc ListTransactionReviews(ListTransactionReviewsRequest) returns (ListTransactionReviewsResponse);
  rpc ConfirmTransactionReview(ConfirmTransactionReviewRequest) returns (ConfirmTransactionReviewResponse);
  rpc DismissTransactionReview(DismissTransactionReviewRequest) returns (DismissTransactionReviewResponse);
  rpc MarkTransactionForReview(MarkTransactionForReviewRequest) returns (MarkTransactionForReviewResponse);
}

// ─── Core entities ───────────────────────────────────────────────────────────

// The stable, user-configured budget. People, payment methods, and income
// sources all belong here and carry forward across every period.
message BudgetProfile {
  string id = 1;
  string user_id = 2;
  string name = 3;
  BudgetCycle cycle = 4;
  string country_code = 5; // propagated from owner at creation
}

// One cycle window of a BudgetProfile. Auto-created by the cycling job;
// the first is created immediately when the profile is set up.
message BudgetPeriod {
  string id = 1;
  string budget_profile_id = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
  bool is_archived = 5;
}

// A person tracked on the budget profile. Not a registered user necessarily.
message BudgetPerson {
  int64 id = 1;
  string budget_profile_id = 2;
  string user_name = 3;
  string user_id = 4; // empty when person is not a registered user
  string color = 5;
  BudgetRole role = 6; // UNSPECIFIED when not linked to a real user
}

// Template for an income stream. Carries forward every period.
// Hourly/freelance sources have default_amount = 0 — user fills in each period.
message IncomeSource {
  int64 id = 1;
  string budget_profile_id = 2;
  string name = 3;
  IncomeType income_type = 4;
  Money default_amount = 5;
  bool recurring = 6;
  int64 budget_person_id = 7; // 0 = unattributed
  RecurringType payment_frequency = 8; // how often the income is received
  bool before_tax = 9; // true = gross income, tax estimation applies
}

// Actual income amount for one period. Pre-filled from IncomeSource.default_amount;
// user edits the amount each period (especially for hourly sources).
message IncomeEntry {
  int64 id = 1;
  string budget_period_id = 2;
  int64 income_source_id = 3; // 0 = standalone entry not linked to a source
  string name = 4; // denormalized from source for display
  Money amount = 5;
  int64 budget_person_id = 6; // 0 = unattributed, denormalized from source
}

// A planned savings allocation on the profile. Carries forward every period.
message SavingsSource {
  int64 id = 1;
  string budget_profile_id = 2;
  string name = 3;
  Money amount = 4; // per-occurrence amount (e.g. $200 per paycheck)
  RecurringType frequency = 5; // how often this saving is made
  bool is_tax_reserve = 6; // auto-managed by system; recalculated on each budget roll
  int64 budget_person_id = 7;
  optional Money federal_amount = 8; // monthly federal tax component (tax reserve only)
  optional Money state_amount = 9; // monthly state tax component (tax reserve only)
  string payment_method_id = 10; // optional: payment method used for this saving
  repeated int32 payment_days = 11; // day-of-month for each scheduled transfer; count encodes frequency (1=monthly, 2=bi-weekly, 4=weekly)
}

// A spend, saving, or fixed expense within a period.
message Transaction {
  string id = 1;
  string name = 2;
  Money amount = 3; // actual paid amount (set when is_paid = true); equals planned_amount otherwise
  Money planned_amount = 4;
  google.protobuf.Timestamp date = 5;
  google.protobuf.Timestamp renewal_date = 6; // when a recurring fixed tx expires
  bool recurring = 7;
  string budget_period_id = 8;
  int32 category_id = 9;
  string payment_method_id = 10;
  int32 transaction_frequency_id = 11;
  int32 transaction_type_id = 12;
  bool is_paid = 13;
  google.protobuf.Timestamp paid_at = 14;
  string fixed_expense_id = 15; // set when spawned from a FixedExpense template
}

// Profile-level template for a recurring fixed expense.
// Spawns one transaction per budget period via createNextPeriod.
message FixedExpense {
  string id = 1;
  string budget_profile_id = 2;
  string name = 3;
  Money planned_amount = 4;
  int32 category_id = 5; // 0 = unset
  string payment_method_id = 6; // empty = unset
  int32 day_of_month = 7; // 1–31; clamped to last day of month when needed
  bool is_active = 8;
  int32 interval_months = 9; // 1 = every month (default), 3 = quarterly, 12 = yearly, etc. Applies when frequency_unit = MONTH.
  google.protobuf.Timestamp next_due_date = 10; // computed, not persisted
  optional google.protobuf.Timestamp anchor_date = 11; // explicit interval anchor + day source; overrides created_at/day_of_month when set
  FrequencyUnit frequency_unit = 12; // UNSPECIFIED/MONTH = today's month-based behavior (default); WEEK = interval_weeks + day_of_week apply instead
  int32 interval_weeks = 13; // 1 = every week; applies when frequency_unit = WEEK
  int32 day_of_week = 14; // 1 = Monday ... 7 = Sunday (ISO 8601); applies when frequency_unit = WEEK
  optional google.protobuf.Timestamp end_date = 15; // when set, the expense auto-deactivates after this date; the period containing this date is the last to spawn
  int32 total_payments = 16; // total number of payments in the plan; 0 = unset; informational only — end_date is the authoritative stop condition
}

message Category {
  int32 id = 1;
  string name = 2;
  int32 type_id = 3;
  bool is_system = 4;
  string color = 5;
}

message PaymentMethod {
  string id = 1;
  string name = 2;
  PaymentType type = 3;
  int64 budget_person_id = 4; // 0 = unattributed
  string color = 5;
}

// A per-person planned spending amount for a category. Profile-scoped; carries forward across periods.
message ExpenseAllocation {
  int64 id = 1;
  string budget_profile_id = 2;
  int32 category_id = 3;
  int64 budget_person_id = 4; // 0 = unattributed
  Money planned_amount = 5;
}

// ─── BudgetProfile CRUD ──────────────────────────────────────────────────────

message CreateBudgetProfileRequest {
  string name = 1;
  BudgetCycle cycle = 2;
}

message CreateBudgetProfileResponse {
  BudgetProfile profile = 1;
}

message ListBudgetProfilesRequest {}

message ListBudgetProfilesResponse {
  repeated BudgetProfile profiles = 1;
}

message GetBudgetProfileRequest {
  string id = 1;
}

message GetBudgetProfileResponse {
  BudgetProfile profile = 1;
}

message UpdateBudgetProfileRequest {
  string id = 1;
  string name = 2;
  BudgetCycle cycle = 3;
}

message UpdateBudgetProfileResponse {
  BudgetProfile profile = 1;
}

message DeleteBudgetProfileRequest {
  string id = 1;
}

message DeleteBudgetProfileResponse {}

// ─── BudgetPeriod ────────────────────────────────────────────────────────────

// Creates the next period for a profile. Dates are computed from the profile's
// cycle and the previous period's end date (or today for the first period).
message CreateBudgetPeriodRequest {
  string budget_profile_id = 1;
}

message CreateBudgetPeriodResponse {
  BudgetPeriod period = 1;
}

message ListBudgetPeriodsRequest {
  string budget_profile_id = 1;
}

message ListBudgetPeriodsResponse {
  repeated BudgetPeriod periods = 1;
}

message GetBudgetPeriodRequest {
  string id = 1;
}

message GetBudgetPeriodResponse {
  BudgetPeriod period = 1;
}

// ─── People ──────────────────────────────────────────────────────────────────

message NewBudgetPerson {
  string user_name = 1;
  string user_id = 2; // optional
  string color = 3;
}

message AddBudgetPeopleRequest {
  string budget_profile_id = 1;
  repeated NewBudgetPerson people = 2;
}

message AddBudgetPeopleResponse {
  repeated BudgetPerson people = 1;
}

message ListBudgetPeopleRequest {
  string budget_profile_id = 1;
}

message ListBudgetPeopleResponse {
  repeated BudgetPerson people = 1;
}

message RemoveBudgetPersonRequest {
  string budget_profile_id = 1;
  int64 person_id = 2;
  int64 replacement_person_id = 3; // 0 = no reassignment needed
  string replacement_payment_method_id = 4; // empty = no reassignment needed
}

message RemoveBudgetPersonResponse {}

message UpdateBudgetPersonRequest {
  int64 id = 1;
  string budget_profile_id = 2;
  string color = 3;
}

message UpdateBudgetPersonResponse {
  BudgetPerson person = 1;
}

message UpdateBudgetPersonRoleRequest {
  int64 person_id = 1;
  string budget_profile_id = 2;
  BudgetRole role = 3;
}

message UpdateBudgetPersonRoleResponse {
  BudgetPerson person = 1;
}

// ─── Income sources ──────────────────────────────────────────────────────────

message AddIncomeSourceRequest {
  string budget_profile_id = 1;
  string name = 2;
  IncomeType income_type = 3;
  Money default_amount = 4;
  bool recurring = 5;
  int64 budget_person_id = 6; // 0 = unattributed
  RecurringType payment_frequency = 7;
  bool before_tax = 8;
}

message AddIncomeSourceResponse {
  IncomeSource source = 1;
}

message ListIncomeSourcesRequest {
  string budget_profile_id = 1;
}

message ListIncomeSourcesResponse {
  repeated IncomeSource sources = 1;
}

message UpdateIncomeSourceRequest {
  int64 id = 1;
  string budget_profile_id = 2;
  string name = 3;
  IncomeType income_type = 4;
  Money default_amount = 5;
  bool recurring = 6;
  int64 budget_person_id = 7;
  RecurringType payment_frequency = 8;
  bool before_tax = 9;
}

message UpdateIncomeSourceResponse {
  IncomeSource source = 1;
}

message DeleteIncomeSourceRequest {
  int64 id = 1;
  string budget_profile_id = 2;
}

message DeleteIncomeSourceResponse {}

// ─── Income entries ──────────────────────────────────────────────────────────

message ListIncomeEntriesRequest {
  string budget_period_id = 1;
}

message ListIncomeEntriesResponse {
  repeated IncomeEntry entries = 1;
}

// Only amount is editable per period; source metadata is the source of truth.
message UpdateIncomeEntryRequest {
  int64 id = 1;
  string budget_period_id = 2;
  Money amount = 3;
}

message UpdateIncomeEntryResponse {
  IncomeEntry entry = 1;
}

// ─── Savings sources ─────────────────────────────────────────────────────────

message AddSavingsSourceRequest {
  reserved 4, 6; // removed: frequency (inferred from payment_days), budget_person_id (inferred from payment method)
  string budget_profile_id = 1;
  string name = 2;
  Money amount = 3;
  string payment_method_id = 5;
  repeated int32 payment_days = 7; // 1=monthly, 2=bi-weekly, 4=weekly
}

message AddSavingsSourceResponse {
  SavingsSource source = 1;
}

message ListSavingsSourcesRequest {
  string budget_profile_id = 1;
}

message ListSavingsSourcesResponse {
  repeated SavingsSource sources = 1;
}

message UpdateSavingsSourceRequest {
  reserved 5, 7; // removed: frequency (inferred from payment_days), budget_person_id (inferred from payment method)
  int64 id = 1;
  string budget_profile_id = 2;
  string name = 3;
  Money amount = 4;
  string payment_method_id = 6;
  repeated int32 payment_days = 8; // 1=monthly, 2=bi-weekly, 4=weekly
}

message UpdateSavingsSourceResponse {
  SavingsSource source = 1;
}

message DeleteSavingsSourceRequest {
  int64 id = 1;
  string budget_profile_id = 2;
}

message DeleteSavingsSourceResponse {}

// ─── Transactions ────────────────────────────────────────────────────────────

message ListTransactionsRequest {
  string budget_period_id = 1;
  int32 category_id = 2; // 0 = no filter
  int32 transaction_type_id = 3; // 0 = no filter
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
}

message CreateTransactionRequest {
  string name = 1;
  Money amount = 2;
  Money planned_amount = 3;
  google.protobuf.Timestamp date = 4;
  google.protobuf.Timestamp renewal_date = 5;
  bool recurring = 6;
  string budget_period_id = 7;
  int32 category_id = 8;
  string payment_method_id = 9;
  int32 transaction_frequency_id = 10;
  int32 transaction_type_id = 11;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message UpdateTransactionRequest {
  string id = 1;
  string name = 2;
  Money amount = 3;
  Money planned_amount = 4;
  google.protobuf.Timestamp date = 5;
  bool recurring = 6;
  int32 category_id = 7;
  string payment_method_id = 8;
  int32 transaction_frequency_id = 9;
  int32 transaction_type_id = 10;
}

message UpdateTransactionResponse {
  Transaction transaction = 1;
}

message DeleteTransactionRequest {
  string id = 1;
  string budget_period_id = 2;
}

message DeleteTransactionResponse {}

message MarkTransactionAsPaidRequest {
  string id = 1;
  string budget_period_id = 2;
  Money paid_amount = 3;
  google.protobuf.Timestamp paid_at = 4;
}

message MarkTransactionAsPaidResponse {
  Transaction transaction = 1;
}

message UnmarkTransactionAsPaidRequest {
  string id = 1;
  string budget_period_id = 2;
}

message UnmarkTransactionAsPaidResponse {
  Transaction transaction = 1;
}

// ─── Categories ──────────────────────────────────────────────────────────────

message ListCategoriesRequest {
  // When provided, also returns categories referenced by transactions or fixed expenses in this budget.
  // Allows budget members to see categories created by the budget owner.
  string budget_profile_id = 1;
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message CreateCategoryRequest {
  string name = 1;
  string color = 2;
}

message CreateCategoryResponse {
  Category category = 1;
}

message UpdateCategoryRequest {
  int32 id = 1;
  string name = 2;
  string color = 3;
}

message UpdateCategoryResponse {
  Category category = 1;
}

// Reassigns all transactions referencing this category before deleting it.
message DeleteCategoryRequest {
  int32 id = 1;
  int32 replacement_id = 2;
}

message DeleteCategoryResponse {}

// ─── Payment methods ──────────────────────────────────────────────────────────

message ListPaymentMethodsRequest {
  string budget_profile_id = 1;
}

message ListPaymentMethodsResponse {
  repeated PaymentMethod methods = 1;
}

message CreatePaymentMethodRequest {
  string name = 1;
  PaymentType type = 2;
  int64 budget_person_id = 3; // 0 = unattributed
  string color = 4;
}

message CreatePaymentMethodResponse {
  PaymentMethod method = 1;
}

message UpdatePaymentMethodRequest {
  string id = 1;
  string name = 2;
  string color = 3;
}

message UpdatePaymentMethodResponse {
  PaymentMethod method = 1;
}

// Reassigns all transactions referencing this method before deleting it.
message DeletePaymentMethodRequest {
  string id = 1;
  string replacement_id = 2;
  string budget_profile_id = 3;
}

message DeletePaymentMethodResponse {}

// ─── Expense allocations ──────────────────────────────────────────────────────

message ListExpenseAllocationsRequest {
  string budget_profile_id = 1;
}

message ListExpenseAllocationsResponse {
  repeated ExpenseAllocation allocations = 1;
}

message UpsertExpenseAllocationRequest {
  string budget_profile_id = 1;
  int32 category_id = 2;
  int64 budget_person_id = 3; // 0 = unattributed
  Money planned_amount = 4;
}

message UpsertExpenseAllocationResponse {
  ExpenseAllocation allocation = 1;
}

message DeleteExpenseAllocationRequest {
  int64 id = 1;
  string budget_profile_id = 2;
}

message DeleteExpenseAllocationResponse {}

// ─── Fixed expenses ───────────────────────────────────────────────────────────

message ListFixedExpensesRequest {
  string budget_profile_id = 1;
}

message ListFixedExpensesResponse {
  repeated FixedExpense expenses = 1;
}

message CreateFixedExpenseRequest {
  string budget_profile_id = 1;
  string name = 2;
  Money planned_amount = 3;
  int32 category_id = 4; // 0 = unset
  string payment_method_id = 5; // empty = unset
  int32 day_of_month = 6;
  int32 interval_months = 7; // 1 = every month (default) if unset/zero
  optional google.protobuf.Timestamp anchor_date = 8; // when set, overrides created_at + day_of_month; immediate spawn becomes conditional on due-check
  FrequencyUnit frequency_unit = 9; // UNSPECIFIED/MONTH (default) or WEEK
  int32 interval_weeks = 10; // applies when frequency_unit = WEEK
  int32 day_of_week = 11; // 1 = Monday ... 7 = Sunday; applies when frequency_unit = WEEK
  optional google.protobuf.Timestamp end_date = 12; // payment plan end date; the period containing this date is the last to spawn
  int32 total_payments = 13; // total number of payments; 0 = unset; informational — end_date is authoritative
}

message CreateFixedExpenseResponse {
  FixedExpense expense = 1;
  Transaction transaction = 2; // spawned in the current period
}

message UpdateFixedExpenseRequest {
  string id = 1;
  string budget_profile_id = 2;
  string name = 3;
  Money planned_amount = 4;
  int32 category_id = 5;
  string payment_method_id = 6;
  int32 day_of_month = 7;
  int32 interval_months = 8;
  optional google.protobuf.Timestamp anchor_date = 9; // when set, overrides created_at + day_of_month for this expense going forward
  FrequencyUnit frequency_unit = 10; // UNSPECIFIED/MONTH (default) or WEEK
  int32 interval_weeks = 11; // applies when frequency_unit = WEEK
  int32 day_of_week = 12; // 1 = Monday ... 7 = Sunday; applies when frequency_unit = WEEK
  optional google.protobuf.Timestamp end_date = 13; // payment plan end date; null = clear it (expense becomes indefinite again)
  int32 total_payments = 14; // total number of payments; 0 = clear it
}

message UpdateFixedExpenseResponse {
  FixedExpense expense = 1;
}

message DeleteFixedExpenseRequest {
  string id = 1;
  string budget_profile_id = 2;
}

message DeleteFixedExpenseResponse {}

// ─── Transaction review ───────────────────────────────────────────────────────

message TransactionReview {
  string id = 1;
  string budget_period_id = 2;
  string transaction_id = 3;
  string fixed_expense_id = 4; // deprecated — superseded by matched_transaction_id, no longer populated
  double match_score = 5;
  string status = 6; // pending, confirmed, dismissed
  // Denormalized display fields
  string transaction_name = 7;
  Money transaction_amount = 8;
  string fixed_expense_name = 9; // deprecated — superseded by matched_transaction_name, no longer populated
  google.protobuf.Timestamp created_at = 10;
  // The specific period transaction this review matches against — a Fixed-type
  // transaction, whether spawned from a FixedExpense template or a
  // SavingsSource. Referencing the transaction directly (rather than a
  // FixedExpense template) lets any Fixed-type transaction be a match target,
  // savings included, with no separate savings-specific matching path.
  string matched_transaction_id = 11;
  string matched_transaction_name = 12;
}

message ListTransactionReviewsRequest {
  string budget_profile_id = 1;
}

message ListTransactionReviewsResponse {
  repeated TransactionReview reviews = 1;
}

message ConfirmTransactionReviewRequest {
  string review_id = 1;
  string budget_profile_id = 2;
}

message ConfirmTransactionReviewResponse {}

message DismissTransactionReviewRequest {
  string review_id = 1;
}

message DismissTransactionReviewResponse {}

message MarkTransactionForReviewRequest {
  string transaction_id = 1;
  string fixed_expense_id = 2; // deprecated — superseded by matched_transaction_id, no longer read
  string budget_profile_id = 3;
  string matched_transaction_id = 4; // the Fixed-type transaction (fixed-expense- or savings-derived) this one duplicates
}

message MarkTransactionForReviewResponse {
  TransactionReview review = 1;
}
