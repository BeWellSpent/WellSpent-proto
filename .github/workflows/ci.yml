name: CI

on:
  push:
    branches: [main, develop, 'feature/**']

jobs:
  check:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: true
          format: true
          breaking: false
          push: false

  publish:
    name: Push to Buf Schema Registry
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          lint: false
          format: false
          breaking: false
          # breaking check disabled for intentional architectural rework
          # restore to: breaking: true / breaking_against: buf.build/bewellspent/wellspent
          push: true
